<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title">
  <title id="title">The Slightly Rude Personality Test - Option A</title>
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="18%" stop-color="#f59e0b"/>
      <stop offset="36%" stop-color="#84cc16"/>
      <stop offset="54%" stop-color="#14b8a6"/>
      <stop offset="72%" stop-color="#3b82f6"/>
      <stop offset="86%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="50" width="1056" height="530" rx="42" fill="url(#rainbow)"/>
  <rect x="76" y="54" width="1048" height="522" rx="38" fill="#ffffff"/>

  <!-- subtle animal icon background -->
  <text x="140" y="132" fill="#94a3b8" opacity="0.24" font-size="72">🦊</text>
  <text x="1068" y="126" fill="#94a3b8" opacity="0.24" font-size="72" text-anchor="end">🦉</text>
  <text x="116" y="520" fill="#94a3b8" opacity="0.24" font-size="72">🦁</text>
  <text x="1088" y="520" fill="#94a3b8" opacity="0.24" font-size="72" text-anchor="end">🐙</text>
  <text x="242" y="468" fill="#a3b2c9" opacity="0.2" font-size="52">🐺</text>
  <text x="958" y="468" fill="#a3b2c9" opacity="0.2" font-size="52" text-anchor="end">🐧</text>

  <!-- centered playful title block -->
  <text
    x="600"
    y="315"
    text-anchor="middle"
    fill="#1e3a5f"
    font-family="'Avenir Next Rounded','Arial Rounded MT Bold','Quicksand','Nunito',ui-sans-serif,system-ui,sans-serif"
    font-weight="600"
    letter-spacing="0.3"
  >
    <tspan x="600" dy="-28" font-size="88">The Slightly Rude</tspan>
    <tspan x="600" dy="98" font-size="92">Personality Test</tspan>
  </text>
</svg>
